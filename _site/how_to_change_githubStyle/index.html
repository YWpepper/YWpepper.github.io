<h2 id="修改步骤">修改步骤</h2>

<h3 id="1-找到主题配置文件">1. 找到主题配置文件</h3>

<p>找到源代码中的 <code class="language-plaintext highlighter-rouge">_sass</code> 文件夹,其中包含主要的主题设置。</p>

<p><img src="https://virginia-pepper.oss-cn-guangzhou.aliyuncs.com/img/blog/202503111058070.png" alt="主题配置文件" /></p>

<h3 id="2-查看参考样式">2. 查看参考样式</h3>

<p>修改部分代码前,可以通过浏览器的 F12 开发者工具查看其他网站的字体设置,这些主题一般都是全局变量。</p>

<p><img src="https://virginia-pepper.oss-cn-guangzhou.aliyuncs.com/img/blog/202503111120750.png" alt="开发者工具查看" /></p>

<p>然后修改自己的配置文件中的字体设置:</p>
